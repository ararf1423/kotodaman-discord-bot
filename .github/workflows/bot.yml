name: Kotodaman Notify Bot

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run Bot
        env:
          EVENT_WEBHOOK_URL: ${{ secrets.EVENT_WEBHOOK_URL }}
          GACHA_WEBHOOK_URL: ${{ secrets.GACHA_WEBHOOK_URL }}
        run: |
          python main.py

      - name: Save events.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add events.json

          git commit -m "Update events.json" || exit 0

          git push
      
      - name: Test Save Step
        run: |
          echo "Save step reached"